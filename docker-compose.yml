version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sniperphish-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sniperphish
      MYSQL_USER: sniperphish_user
      MYSQL_PASSWORD: sniperphish_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  php:
    build: ./docker
    container_name: sniperphish-web
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/apache.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "a2enmod rewrite && apache2-foreground"

volumes:
  mysql_data:
